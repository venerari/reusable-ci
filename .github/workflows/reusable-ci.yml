name: Reusable CI

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name including namespace
        required: true
        type: string
      dockerhub_username:
        description: Docker Hub username
        required: true
        type: string
      push_image:
        description: Push Docker image to registry
        required: false
        default: false
        type: boolean
      run_sonar:
        description: Run SonarQube scan
        required: false
        default: true
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: false
      SONARQUBE_TOKEN:
        required: false

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build script
        run: npm run build

      - name: Smoke test application
        shell: bash
        run: |
          set -euo pipefail
          npm start &
          app_pid=$!
          trap 'kill "$app_pid"' EXIT
          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:3000/ | grep -Fx 'Hello Node!'; then
              exit 0
            fi
            sleep 1
          done
          echo "Application did not become ready in time" >&2
          exit 1

      - name: SonarQube scan
        if: inputs.run_sonar && env.SONARQUBE_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ env.SONARQUBE_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: inputs.push_image && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ inputs.push_image && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ inputs.image_name }}:latest
            ${{ inputs.image_name }}:${{ github.sha }}
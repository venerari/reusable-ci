name: Reusable CI

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name including namespace
        required: true
        type: string
      dockerhub_username:
        description: Docker Hub username
        required: true
        type: string
      push_image:
        description: Push Docker image to registry
        required: false
        default: false
        type: boolean
      run_sonar:
        description: Run SonarQube scan
        required: false
        default: true
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: false
      SONARQUBE_TOKEN:
        required: false

jobs:
  build:
    uses: ./.github/workflows/npmbuild.yml

  scan:
    needs: build
    uses: ./.github/workflows/sonar.yml
    with:
      run_sonar: ${{ inputs.run_sonar }}
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

  docker:
    needs: [build, scan]
    if: ${{ always() && needs.build.result == 'success' && (needs.scan.result == 'success' || needs.scan.result == 'skipped') }}
    uses: ./.github/workflows/dockers.yaml
    with:
      image_name: ${{ inputs.image_name }}
      dockerhub_username: ${{ inputs.dockerhub_username }}
      push_image: ${{ inputs.push_image }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}